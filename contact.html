{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0 p-5 bg-white">
            <h2 class="text-primary fw-bold mb-4">Contact Us</h2>
            <p>Have questions? Fill out the form below and our team will get back to you within 24 hours.</p>
            <form class="mt-4">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" placeholder="Enter your name">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="name@example.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Message</label>
                    <textarea class="form-control" rows="5" placeholder="How can we help?"></textarea>
                </div>
                <button type="button" class="btn btn-primary px-5 py-2" onclick="alert('Message sent! This is a demo form.')">Send Message</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
